name: Score Submission

on:
  pull_request:
    branches:
      - main
    paths:
      - "submissions/**"
  workflow_dispatch:
    inputs:
      participant_id:
        description: "Participant ID to score, for example AIEX-YOUR-TEAM"
        required: true
        type: string

permissions:
  contents: read

jobs:
  score:
    runs-on: ubuntu-latest

    steps:
      - name: Validate changed paths
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number,
              per_page: 100,
            });

            const invalid = files
              .map((file) => file.filename)
              .filter((filename) => {
                if (!filename.startsWith("submissions/")) return true;
                return !/^(submissions\/AIEX-[A-Z0-9][A-Z0-9-]{2,40}\/(profile\.json|README\.md|mission-(0[1-9]|10)\.json)|submissions\/README\.md|submissions\/\.gitkeep)$/.test(filename);
              });

            if (invalid.length > 0) {
              core.setFailed([
                "Submission PRs may only change JSON or Markdown files under submissions/AIEX-YOUR-TEAM/.",
                "",
                "Invalid files:",
                ...invalid.map((filename) => `- ${filename}`),
              ].join("\n"));
            }

      - name: Check out repository
        uses: actions/checkout@v6.0.3

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version-file: .python-version

      - name: Score participant bundle
        env:
          PARTICIPANT_ID: ${{ inputs.participant_id }}
        run: |
          mkdir -p artifacts
          if [ -n "$PARTICIPANT_ID" ]; then
            uv run python -m challenge.scorer \
              --submission-root submissions \
              --participant-id "$PARTICIPANT_ID" \
              --result artifacts/score.json \
              | tee artifacts/score.md
          else
            uv run python -m challenge.scorer \
              --submission-root submissions \
              --result artifacts/score.json \
              | tee artifacts/score.md
          fi

      - name: Add score to job summary
        if: always()
        run: |
          if [ -f artifacts/score.md ]; then
            cat artifacts/score.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload scoring artifact
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: score
          path: |
            artifacts/score.json
            artifacts/score.md
          if-no-files-found: ignore
